<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class = 'heading'>
            <h1>The Daily Verifier</h1>
        </div>

        <div class="info">
            <span>Vol. I</span>
            <span>EST. 2026</span>
            <span>Kanpur Edition</span>
        </div>
    </header>

    <div class="divider"></div>



    <main class="newspaper">
        <div class="input_area">
            <h3>
                Dispatch to the Editor
            </h3>
            <div>
                <textarea id="text-input" placeholder="Paste text for verification..."></textarea>
            </div>
            
            <div>
                <button onclick="">Consult the Model</button>
            </div>
        </div>

        <div class="verdict_panel">
           <h3>Evaluation result</h3>
            <div class="evaluation_result">

            </div>

        </div>
    </main>
    


    <script src = "script.js"></script>
</body>
</html>
